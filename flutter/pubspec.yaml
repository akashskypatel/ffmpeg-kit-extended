name: ffmpeg_kit_extended_flutter
description: A comprehensive Flutter plugin for executing FFmpeg, FFprobe, and FFplay commands using FFmpeg 8.0 API. Supports Android, Windows, and Linux.
repository: https://github.com/akashskypatel/ffmpeg-kit-extended
issue_tracker: https://github.com/akashskypatel/ffmpeg-kit-extended/issues
homepage: https://github.com/akashskypatel/ffmpeg-kit-extended
documentation: https://github.com/akashskypatel/ffmpeg-kit-extended/tree/master/flutter/doc
version: 0.3.4

topics:
  - ffmpeg
  - media-processing
  - transcoding
  - media-tagging
  - ffmpeg-kit

environment:
  sdk: ">=3.10.0 <4.0.0"

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: FfmpegKitExtendedFlutterPlugin
      windows:
        pluginClass: FfmpegKitExtendedFlutterPlugin
      android:
        package: com.akashskypatel.ffmpeg_kit_extended_flutter
        pluginClass: FfmpegKitExtendedFlutterPlugin
      ios:
        pluginClass: FfmpegKitExtendedFlutterPlugin
      macos:
        pluginClass: FfmpegKitExtendedFlutterPlugin

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  logging: ^1.3.0
  path: ^1.9.1
  yaml: ^3.1.2
  hooks: ^1.0.0
  code_assets: ^1.0.0
  data_assets: ^0.19.6
dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  leak_tracker_flutter_testing: ^3.0.10
  lints: ^6.1.0
  plugin_platform_interface: ^2.1.5
  test: ^1.26.3
