name: ffmpeg_kit_extended_flutter_example
description: "Demonstrates how to use the ffmpeg_kit_extended_flutter plugin."
repository: https://github.com/akashskypatel/ffmpeg-kit-extended
issue_tracker: https://github.com/akashskypatel/ffmpeg-kit-extended/issues
homepage: https://github.com/akashskypatel/ffmpeg-kit-extended
publish_to: "none"

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  ffmpeg_kit_extended_flutter:
    path: ../

  cupertino_icons: ^1.0.8
  path: ^1.9.1
  file_picker: ^10.3.10
  android_media_store: ^0.0.1
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  window_manager: ^0.4.3

dev_dependencies:
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

ffmpeg_kit_extended_config:
  type: "video"
  gpl: true
  small: true
  # windows: "\\\\wsl.localhost\\ManyLinux\\home\\vscode\\ffmpeg-kit-builders\\prebuilt\\windows-x86_64\\releases\\bundle-video-windows-x86_64-shared-lgpl.zip"
  # linux: "/home/vscode/ffmpeg-kit-builders/prebuilt/linux-x86_64/releases/bundle-video-linux-x86_64-shared-lgpl.zip"
  # android: "\\\\wsl.localhost\\ManyLinux\\home\\vscode\\ffmpeg-kit-builders\\tools\\android\\build\\outputs\\aar\\bundle-video-android-x86_64-shared-lgpl-release.aar"
