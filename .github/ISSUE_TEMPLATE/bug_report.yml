name: Bug Report
description: File a bug report to help us improve.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Bug description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior and minimal code to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen. Don't just say "works" or "doesn't work", explain what should happen and the intent of your code and ffmpeg command(s).
    validations:
      required: true
  - type: textarea
    id: ffmpeg-command
    attributes:
      label: Raw FFmpeg command(s) being executed in your code
      description: The FFmpeg command(s) that caused the issue as a string.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS version, Flutter version, FFmpegKit version, etc.
      placeholder: |
        - OS: [e.g. Windows 11]
        - Flutter: [e.g. 3.22.0]
        - ffmpeg-kit-extended version: [e.g. 1.0.0]
    validations:
      required: true
  - type: textarea
    id: logs
    validations:
      required: true
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output.
      render: shell
  - type: textarea
    id: pubspec
    validations:
      required: true
    attributes:
      label: pubspec.yaml
      description: Please copy and paste your pubspec.yaml.
      render: yaml
  - type: checkboxes
    id: checks
    attributes:
      label: Checkbox
      options:
        - label: I have searched for existing issues.
          required: true
        - label: I have checked the documentation.
          required: true
        - label: I have updated to the latest version of the plugin.
          required: true
        - label: I have provided a minimal reproduction case.
          required: true
        - label: I have provided a copy of pubspec.yaml.
          required: true
        - label: I understand that I have filled in all required fields and that leaving any field empty will result in the issue being closed or ignored.
          required: true
